name: Auto Commit Green Bot

on:
  push:
    branches:
      - main
  schedule:
    - cron: '*/5 * * * *'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Mass Commit and Push
      run: |
        git config --global user.email "sqrilizz@example.com"
        git config --global user.name "Sqrilizz"
        for i in {1..5000}; do
          echo "Mass boost $i - $(date)" > bot_log.txt
          git commit -am "chore: automated mass boost $i [skip ci]" --quiet
        done
        git push origin main --force
